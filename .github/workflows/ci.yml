name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SolaxLocalController.slnx

      - name: Build
        run: dotnet build SolaxLocalController.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test SolaxLocalController.slnx --no-build --configuration Release
