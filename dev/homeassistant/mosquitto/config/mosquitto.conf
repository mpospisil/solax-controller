# Mosquitto config for LOCAL DEVELOPMENT ONLY.
#
# Mosquitto 2.x refuses remote connections unless a listener is configured, so this file is
# required for the controller (on the host) and Home Assistant (in a container) to connect.
#
# allow_anonymous is enabled for convenience on a local dev machine -- do NOT use this in
# production. For an auth'd setup, remove allow_anonymous and add:
#   password_file /mosquitto/config/passwd
# then create it with:  docker exec -it solax-dev-mosquitto mosquitto_passwd -c /mosquitto/config/passwd <user>

listener 1883
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type notice
